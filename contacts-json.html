<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Contacts</h2>
<table id="tbl" border="1"></table>

<script>
fetch('/cgi-bin/contacts-json.py')
  .then(res => res.json())
  .then(data => {
    let html = "<tr><th>Name</th><th>Phone</th></tr>";
    data.data.forEach(c => {
      html += `<tr><td>${c.name}</td><td>${c.telephone}</td></tr>`;
    });
    document.getElementById("tbl").innerHTML = html;
  });
</script>

</body>
</html>
